apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-devops
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-devops
  template:
    metadata:
      labels:
        app: hello-devops
    spec:
      containers:
        - name: hello-devops
          image: hello-devops:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: hello-devops
  namespace: default
spec:
  selector:
    app: hello-devops
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
