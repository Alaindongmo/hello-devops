name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/alaindongmo/hello-devops:latest
            ghcr.io/alaindongmo/hello-devops:${{ github.sha }}

      - name: Run tests
        run: |
          docker run -d -p 8000:8000 --name test-app \
            ghcr.io/alaindongmo/hello-devops:${{ github.sha }}
          sleep 3
          curl -f http://localhost:8000/health
          docker stop test-app && docker rm test-app

      - name: Deploy to k3s
        run: |
          kubectl set image deployment/hello-devops \
            hello-devops=ghcr.io/alaindongmo/hello-devops:${{ github.sha }}
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}

      - name: Success
        run: echo "✅ Déployé - SHA ${{ github.sha }}"
